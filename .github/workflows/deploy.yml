name: Deploy to GitHub Pages and Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy-frontend:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -e
            if [ ! -d /opt/project-tracker/.git ]; then
              rm -rf /opt/project-tracker
              git clone https://github.com/mgreenhough/Project_Tracker.git /opt/project-tracker
            fi
            cd /opt/project-tracker
            git pull origin main
            cd backend
            npm install
            npm run build
            echo "Build completed. Checking dist/server.js..."
            ls -la dist/server.js
            mkdir -p data
            JWT_SECRET_VALUE=""
            if [ -f .env ]; then
              JWT_SECRET_VALUE=$(grep "^JWT_SECRET=" .env | cut -d'=' -f2-)
            fi
            echo "PORT=3001" > .env
            echo "NODE_ENV=production" >> .env
            echo "CORS_ORIGINS=*" >> .env
            if [ -z "$JWT_SECRET_VALUE" ]; then
              echo "JWT_SECRET=$(openssl rand -base64 32)" >> .env
            else
              echo "JWT_SECRET=$JWT_SECRET_VALUE" >> .env
            fi
            if pm2 describe project-tracker > /dev/null 2>&1; then
              pm2 delete project-tracker
            fi
            pm2 start dist/server.js --name project-tracker
            sleep 2
            pm2 status
            pm2 save
            cd /opt/project-tracker
            cp server/Caddyfile /etc/caddy/Caddyfile
            systemctl reload caddy